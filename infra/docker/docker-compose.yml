# =============================================================
# ibi.ren · 单机 docker-compose
# 用法:
#   第一次:  cp .env.prod .env && 编辑 .env
#   启动:    docker compose up -d
#   停止:    docker compose down
#   升级:    git pull && docker compose pull && docker compose up -d
# =============================================================

name: ibiren

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    image: ibi-ren/api:latest
    container_name: ibiren-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3100/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks: [ibiren]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    image: ibi-ren/web:latest
    container_name: ibiren-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks: [ibiren]

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/admin.Dockerfile
    image: ibi-ren/admin:latest
    container_name: ibiren-admin
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api
    networks: [ibiren]

  # 本地 redis (生产建议用阿里云 Redis 7, 这里保留本地版本用于单机部署)
  redis:
    image: redis:7-alpine
    container_name: ibiren-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ibiren]

  # 边缘 nginx:统一域名入口 + TLS + 静态加速
  edge:
    image: nginx:1.27-alpine
    container_name: ibiren-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - admin
    networks: [ibiren]

networks:
  ibiren:
    driver: bridge

volumes:
  redis-data:
