# ============================================================
# ibiren nginx 配置 — ibi.idata.mobi / ibi-admin.idata.mobi (旧)
#                  + ibi.ren / www.ibi.ren / admin.ibi.ren (新,2026-06-30)
#
# 旧域名继续服务不重定向 (用户选择新旧并存);
# 新域名走 Let's Encrypt 证书 (/etc/nginx/ssl/ibi.ren.*) ,
# 证书由 /root/.acme.sh/acme.sh 自动续期 (90 天周期)
# ============================================================

# ============================================================
# HTTP → HTTPS 重定向 (80 端口)
# 关键: /.well-known/acme-challenge/ 走 acme.sh webroot,其余 301
# 这样 acme.sh 的 HTTP-01 文件验证可以工作,即使其他路径都强制 HTTPS
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name ibi.idata.mobi ibi-admin.idata.mobi ibi.ren www.ibi.ren admin.ibi.ren;

    # Let's Encrypt HTTP-01 验证 — 必须保留,不能 301
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他全部 301 重定向到 https
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# 主站 · ibi.idata.mobi (HTTPS, 旧)
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ibi.idata.mobi;

    ssl_certificate     /etc/nginx/ssl/idata.mobi.pem;
    ssl_certificate_key /etc/nginx/ssl/idata.mobi.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 200m;

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /health {
        proxy_pass http://127.0.0.1:3100/health;
        proxy_set_header Host $host;
    }

    location ~ ^/ips/.+\.(jpg|jpeg|png|webp|gif|mp4|webm|svg)$ {
        proxy_pass https://ibi-public.oss-cn-shanghai.aliyuncs.com;
        proxy_set_header Host ibi-public.oss-cn-shanghai.aliyuncs.com;
        proxy_ssl_server_name on;
        proxy_redirect off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        root /var/www/ibiren/web;
        try_files $uri $uri/ /index.html;
    }
}

